# ============================================================
# Biblioteca de Prompts — Nicho Trading
# ============================================================
# Cada prompt está diseñado para generar audio funcional
# que sostenga el estado de concentración durante sesiones
# de trading de 4-8 horas.
# ============================================================

categories:

  stoic_night:
    name: "Estoico Nocturno"
    description: "Ambiente oscuro y minimalista para sesiones nocturnas"
    visual_style: "night_cityscape"
    prompts:
      - text: >
          Deep focus ambient electronic, dark atmospheric synth pads,
          60 BPM, key of A minor, minimal percussion, slow evolving textures,
          cinematic drone, no vocals, meditation undertone, professional studio quality
        mood: "calm_focused"
        energy: "low"
        
      - text: >
          Ambient dark techno, sparse rhythmic elements, deep sub bass drone,
          55 BPM, D minor, reverb-heavy synth layers, distant industrial textures,
          hypnotic and repetitive, no melody, pure concentration atmosphere
        mood: "intense_focus"
        energy: "low"

      - text: >
          Minimalist ambient, lo-fi warm analog synth pads, 50 BPM,
          C minor, tape saturation warmth, gentle noise floor,
          slow filter sweeps, contemplative and still, no percussion
        mood: "deep_calm"
        energy: "very_low"

  alpha_protocol:
    name: "Protocolo Alpha"
    description: "Audio basado en frecuencias para concentración lógica"
    visual_style: "data_visualization"
    prompts:
      - text: >
          432Hz binaural beat ambient foundation, continuous drone tone,
          subtle harmonic overtones, no rhythm, no melody,
          pure sonic texture for deep concentration, laboratory quality,
          theta to alpha wave transition design
        mood: "analytical"
        energy: "minimal"

      - text: >
          Isochronic tones embedded in warm ambient pad, 40Hz gamma frequency,
          subtle pulsing rhythm, no percussion, ethereal synthetic choir,
          clinical precision sound design, focus enhancement audio
        mood: "peak_performance"
        energy: "minimal"

  war_room:
    name: "Sala de Guerra"
    description: "Ambiente de centro de operaciones de alto nivel"
    visual_style: "luxury_trading_desk"
    prompts:
      - text: >
          Lo-fi electronic ambient, subtle data processing sounds,
          70 BPM, atmospheric pads, gentle glitch textures,
          the sound of a high-tech trading floor at night,
          monitors humming, keyboard clicks in the distance,
          professional and sleek, no distracting melodies
        mood: "operational"
        energy: "medium_low"

      - text: >
          Cyberpunk ambient, neon-lit atmosphere, deep bass undertone,
          65 BPM, F minor, synthetic textures resembling digital data streams,
          subtle rhythmic pulse like a heartbeat monitor,
          futuristic trading terminal aesthetic
        mood: "high_stakes"
        energy: "medium"

      - text: >
          Dark ambient electronic, slow build cinematic tension,
          whispered synthetic textures, 58 BPM, Bb minor,
          orchestral drone mixed with digital artifacts,
          the calm before the market opens, anticipation and control
        mood: "pre_market"
        energy: "medium_low"

  wealth_meditation:
    name: "Meditación de Prosperidad"
    description: "Audio diseñado para mentalidad de abundancia y paciencia"
    visual_style: "luxury_skyline"
    prompts:
      - text: >
          Luxurious ambient soundscape, warm golden-tone synth pads,
          crystal singing bowl overtones, 432Hz tuning, 45 BPM,
          gentle reverb cathedral space, wealth and abundance vibration,
          no percussion, timeless and expansive feeling
        mood: "abundance"
        energy: "very_low"

      - text: >
          Serene ambient electronic, soft piano notes dissolving into reverb,
          string-like synthetic pads, 50 BPM, G major,
          optimistic but restrained, morning golden hour atmosphere,
          clean and pristine production, sophisticated elegance
        mood: "confident_calm"
        energy: "low"

# --- Texturas Ambientales (para capas superpuestas) ---
textures:

  rain_on_glass:
    prompt: >
      Rain falling on large glass windows, urban city rain,
      no thunder, steady consistent rainfall, relaxing water sounds,
      muffled city sounds behind the glass, office building rain
    duration_min: 30

  server_hum:
    prompt: >
      Server room ambient noise, gentle fan hum, electronic buzz,
      data center atmosphere, white noise machine quality,
      consistent and hypnotic mechanical drone
    duration_min: 30

  city_distant:
    prompt: >
      Distant city traffic at night, muffled urban sounds,
      high-rise apartment view, wind against windows,
      occasional distant siren very far away, peaceful urban night
    duration_min: 30

  keyboard_asmr:
    prompt: >
      Mechanical keyboard typing ASMR, Cherry MX switches,
      gentle rhythmic tapping, professional coding session,
      no voice, pure keyboard and mouse click sounds
    duration_min: 15

  pink_noise:
    prompt: >
      Professional pink noise, calibrated frequency spectrum,
      warm and enveloping, no harsh frequencies,
      studio-grade noise floor, consistent amplitude
    duration_min: 60

# --- Sistema de Títulos (4 familias) ---
# Mezcla: nicho + estado mental + estética
# Variables: {DURATION}, {MOOD}, {STYLE}, {VERSION}
title_families:

  # A. Session-based — vinculados al horario del mercado
  session:
    - "{DURATION} Deep Focus for Live Trading | {STYLE}"
    - "Pre-Market Focus Session | {DURATION} Ambient | 432Hz"
    - "New York Session Deep Focus | {DURATION} | {STYLE}"
    - "London Open Focus Protocol | {DURATION} Ambient"
    - "After-Hours Review Session | {DURATION} Deep Work"
    - "Asian Session Night Focus | {DURATION} | 432Hz"

  # B. Emotional-control — para el trader que lucha con la disciplina
  emotional:
    - "Calm Focus for Volatile Markets | {DURATION} Ambient"
    - "Emotional Control During Live Sessions | {DURATION}"
    - "Stay Disciplined in the Market | {DURATION} Focus | {STYLE}"
    - "No Overtrading Tonight | {DURATION} Deep Session"
    - "Quiet the Noise, Trade Clean | {DURATION} | 432Hz"
    - "Control Your Impulse | {DURATION} Trading Ambient"

  # C. Identity/status — para el trader que aspira a ser pro
  identity:
    - "Engineered Audio for Professional Traders | {DURATION}"
    - "Focus Like a Funded Trader | {DURATION} | {STYLE}"
    - "Elite Market Session Ambient | {DURATION} | 432Hz"
    - "Deep Focus Protocol for Serious Traders | {DURATION}"
    - "Built for Precision Under Pressure | {DURATION}"
    - "The Discipline Soundtrack | {DURATION} Trading Focus"

  # D. Late-night / aesthetic — máximo CTR por estética
  aesthetic:
    - "Rainy Night Trading Focus | {DURATION} Ambient | {STYLE}"
    - "Midnight Market Session | {DURATION} | 432Hz"
    - "Quiet Charts, Sharp Mind | {DURATION} Deep Session"
    - "Night Desk Focus for Traders | {DURATION} | {STYLE}"
    - "Late Session Protocol | {DURATION} Ambient"
    - "3AM Trading Desk | {DURATION} Deep Focus"

