profile_id: rainy_city_sleep
language: en
mood: rainy city sleep
pulse_density: minimal
tonal_center:
  root: Eb
  octave: 3
scale_family: aeolian
instrumentation:
  primary: [wet drone, soft mist pad, low halo, choir veil]
  secondary: [rain veil, window hush, muted bell mist]
  stems: [drone, motion, texture, accents, rhythm]
  stem_levels_db:
    drone: -2.0
    motion: -7.5
    texture: -8.0
    accents: -15.5
    rhythm: -16.8
  stereo_width: 0.45
  rhythm_style: heartbeat
  rhythm_intensity: 0.08
texture_mix:
  rain: 0.7
  room_tone: 0.22
  air: 0.2
  tape: 0.08
section_schema:
  - role: intro
    share: 0.1
    emotional_goal: Open on rain first, harmony second.
    density: 0.16
    texture_policy: rain_only
    harmonic_drift_policy: anchored
    transition_policy: silk_crossfade
    max_reuse: 0
    layer_budget: 2
    allowed_generators: [procedural_dsp, ace_step_1_5]
  - role: settle
    share: 0.16
    emotional_goal: Let the room feel enclosed and safe.
    density: 0.21
    texture_policy: rain_soft
    harmonic_drift_policy: anchored
    transition_policy: long_blend
    max_reuse: 0
    layer_budget: 3
    allowed_generators: [ace_step_1_5, procedural_dsp]
  - role: drift_a
    share: 0.2
    emotional_goal: Long sleep drift under window rain.
    density: 0.24
    texture_policy: rain_wide
    harmonic_drift_policy: slow_modal_shift
    transition_policy: long_blend
    max_reuse: 1
    layer_budget: 3
    allowed_generators: [ace_step_1_5, procedural_dsp]
  - role: drift_b
    share: 0.18
    emotional_goal: Darker center of gravity without more energy.
    density: 0.25
    texture_policy: rain_wide
    harmonic_drift_policy: descending
    transition_policy: long_blend
    max_reuse: 1
    layer_budget: 3
    allowed_generators: [ace_step_1_5, procedural_dsp]
  - role: sparse_break
    share: 0.1
    emotional_goal: Nearly strip harmony away.
    density: 0.1
    texture_policy: rain_only
    harmonic_drift_policy: anchored
    transition_policy: dissolve
    max_reuse: 0
    layer_budget: 1
    allowed_generators: [procedural_dsp, ace_step_1_5]
  - role: return
    share: 0.16
    emotional_goal: Return to soft harmonic shelter.
    density: 0.2
    texture_policy: rain_soft
    harmonic_drift_policy: rising_return
    transition_policy: long_blend
    max_reuse: 0
    layer_budget: 2
    allowed_generators: [ace_step_1_5, procedural_dsp]
  - role: low_energy_tail
    share: 0.1
    emotional_goal: End in rain and almost no pulse.
    density: 0.08
    texture_policy: rain_only
    harmonic_drift_policy: anchored
    transition_policy: vanish
    max_reuse: 0
    layer_budget: 1
    allowed_generators: [procedural_dsp, ace_step_1_5]
target_length: 2h
loudness_target: -18
thumbnail_style:
  gradient_top: "#233647"
  gradient_bottom: "#03060a"
  accent: "#9ec7ff"
title_families:
  - "Rainy City Sleep | {DURATION}"
  - "{SERIES} | Window Rain for Sleep | {DURATION}"
  - "{DURATION} Rain Sleep Ambient"
forbidden_artifacts:
  - brittle rain
  - sudden harmonic entrance
  - rhythmic insistence
  - bright stereo edges
branding:
  channel_name: "Rainy City Sleep"
  series_name: "Rainy City Sleep"
  description_hook: "Window-rain ambient for sleep, insomnia relief, and urban solitude."
  tags: [rain sleep ambient, insomnia ambient, rainy city sleep, late night rain]
  thumbnail_text: "Rainy City Sleep"
  hud_label: "Rainy City Sleep"
  privacy_status: private
  engine_tag: "Ambient Engine / Free-Open Core"
